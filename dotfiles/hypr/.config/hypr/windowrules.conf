# =========================================================  
# 🪟 REGLAS DE VENTANA (SINTAXIS DE BLOQUES ESTRICTA)  
# =========================================================  
  
# Suprimir eventos de maximizado (ayuda con apps de QT/GTK)  
windowrule {  
    name = suppress-maximize
    match:class = .*
      
    suppress_event = maximize
}

# --- 2. GAMING (Steam, Lutris, Heroic) ---  

# steam (para ventanas de propiedades de juegos)
windowrule {
    name = steam-game-config
    match:class = ^(steam)

    workspace = 5 silent
    float = on
}
  
# >> STEAM (Cliente Principal)  
# Enviar la ventana principal al Workspace 5 y evitar que flote  
windowrule {  
    name = steam-main  
    match:class = ^(steam)$
    match:title = ^(Steam)$
      
    workspace = 5 silent  
    float = off  
}  
  
# >> STEAM (Ventanas Secundarias/Popups)
# Lista de ventanas que deben FLOTAR y CENTRARSE
windowrule {  
    name = steam-popups
    match:class = ^(steam)$
    match:title = ^(Sign in to Steam|Friends List|Steam Settings|Create or select.*|Sign in to Steam|Special Offers)$  
      
    float = on  
    center = on
}  
  
# Regla específica para la lista de amigos (tamaño)
windowrule {
    name = steam-friends-size
    match:class = ^(steam)$
    match:title = ^(Friends List)$
      
    size = 400 600
}  
  
# >> STEAM (Arreglo de Menús y Tooltips)  
# Fix crítico para menús que parpadean o aparecen vacíos  
windowrule {  
    name = steam-menus-fix  
    match:class = ^(steam)$  
    match:title = ^$  
      
    stay_focused = on  
    min_size = 1 1  
}  
  
# >> LANZADORES (Lutris, Heroic)  
# Al Workspace 5 junto con Steam  
windowrule {  
    name = game-launchers  
    match:class = ^(heroic|net.lutris.Lutris)$  
      
    workspace = 5  
}  
  
# >> JUEGOS EN EJECUCIÓN  
# Juegos de Steam, Proton, CS2 o Wine  
windowrule {  
    name = running-games-1
    #match:class = ^(steam_app_.*|steam_proton|cs2|gamescope|epicgameslauncher.exe)$  
    match:class = ^(steam_app_.*|steam_proton|cs2|gamescope|epicgameslauncher.exe)$  
      
    workspace = 6 silent
}  
  
windowrule {  
    name = running-games-2
    match:xdg_tag = ^(proton-game)$
      
    workspace = 6 silent
}

windowrule {  
    name = running-games-3
    match:content = 3 # game
      
    workspace = 6 silent
}

# --- 3. NAVEGACIÓN Y WEB APPS ---  
  
# >> BRAVE (Principal)  

windowrule {  
    name = brave-browser-principal
    match:class = ^(brave-browser)$  
    match:title = ^(Principal)$
      
    maximize = true
    no_blur=true
    workspace = 1  
    border_color = rgb(d05d0e)  
}  

windowrule {  
    name = brave-browser
    match:class = ^(brave-browser)$  
      
    no_blur=true
    opacity = 1 override 1 override  
    border_color = rgb(d05d0e)  
}  

# >> YOUTUBE MUSIC (Web App)  
windowrule {  
    name = webapp-ytmusic
    match:class = ^(brave-music.youtube.com__-Default)$  
      
    workspace = special:ytmusic  
    float = off
}  
  
# >> WHATSAPP (Web App)  
windowrule {  
    name = webapp-whatsapp  
    match:class = ^(brave-web.whatsapp.com__-Default)$  
      
    workspace = special:whatsapp  
    float = off
}  
  
# --- 4. UTILIDADES FLOTANTES ---  
  
# Grupo de Apps que siempre deben flotar y centrarse  
windowrule {  
    name = floating-utils  
    match:class = ^(org.gnome.Nautilus|thunar|org.pulseaudio.pavucontrol|blueman-manager|nm-connection-editor)$  
      
    float = on  
    center = on
}  
  
# Tamaños específicos para Gestor de Archivos  
windowrule {  
    name = FileManager  
    match:class = ^(org.gnome.Nautilus|thunar)$  
      
    size = 1000 800  
    center = on
}  
  
# Tamaños específicos para Control de Volumen  
windowrule {  
    name = pavucontrol-size  
    match:class = ^(org.pulseaudio.pavucontrol)$  
      
    size = 800 500  
}  
  
# --- 5. COMPATIBILIDAD (XWayland Video Bridge) ---  
# Necesario para compartir pantalla en Discord/Zoom  
windowrule {  
    name = xwayland-videobridge  
    match:class = ^(xwaylandvideobridge)$  
      
    opacity = 0.0 override 0.0 override  
    no_anim = on  
    no_initial_focus = on  
    max_size = 1 1  
    no_blur = on  
}

windowrule {
    name = explorador-archivos
    match:class = ^(org.kde.dolphin)$

    float = on
    center = on
    #size = 1200 800
    size = monitor_w*0.84 monitor_h*0.84
}

windowrule {
    name = guardado-de-archivos-portal
    match:class = ^(org.freedesktop.impl.portal.desktop.kde)$

    float = on
    center = on
    size = monitor_w*0.84 monitor_h*0.84

}

windowrule {
    name = Print
    match:initial_title = ^(Print)$

    float = on
}

windowrule {
    name = Qalculate
    match:class = ^(qalculate-gtk)

    float = on
    size = 782 539
}

windowrule {
    name = Terminal
    match:class = ^(Alacritty)

    float = off
    size = 1167, 793
}

windowrule {
    name = PacketTracerOther
    match:class = ^(PacketTracer)
    opacity = 1.0 override 1.0 override

    stay_focused = off
    float = on
}

windowrule {
    name = PacketTracerOther-2
    match:class = ^(PacketTracer)
    match:title = ^(Error)
    
    opacity = 1.0 override 1.0 override
    stay_focused = off
    float = on
}

windowrule {
    name = PacketTracerMain
    tag = +principal
    match:class = ^(PacketTracer)
    match:title = ^(Cisco Packet Tracer.*)
    opacity = 1.0 override 1.0 override

    float = off
    stay_focused = off
}

windowrule {
    name = PacketTracerModule
    match:class = ^(PacketTracer)
    opacity = 1.0 override 1.0 override
    #match:size = 10 10

    # Para que se pueda arrastrar
    stay_focused = on
    #focus_on_activate = off
    float = on
}

windowrule {
    name = PacketTracerWine
    match:class = ^(packettracer.exe)
    match:title = ^(Cisco Packet Tracer)

    float = on
}


## Workspaces
windowrule {
    name = workspace1
    match:workspace = 1

    float = on
    size = 80% 80%
}

windowrule {
    name = workspace10
    match:workspace = 10

    opacity = 1 override 1 override  
    focus_on_activate = off
}

