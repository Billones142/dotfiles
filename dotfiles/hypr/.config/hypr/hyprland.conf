# --- MONITORES ---
# Monitor principal para que sunshine pueda tener un stream constante
exec-once = ~/.scripts/sunshine_desk_deactivate.sh
monitor=HEADLESS-2,1920x1080@144,auto,1#,bitdepth,10,cm,hdr

#monitorv2 {
#    output = HEADLESS-2
#    mode = 1920x1080@144
#    position = 0x0
#    scale = 1
#    bitdepth = 8
#    #bitdepth = 10
#    #cm = hdr
#}

#monitor=desc:Acer Technologies Acer KG241 P 0x92638149,1920x1080@144,auto,1,bitdepth,8,mirror,HEADLESS-2
monitorv2 {
    output = desc:Acer Technologies Acer KG241 P 0x92638149
    mirror = HEADLESS-2
    mode = 1920x1080@144
    scale = 1
    bitdepth = 8
    #bitdepth = 10
    #cm = hdr
}

#monitor=DP-3,1920x1080@144,auto,1,bitdepth,8,mirror,HEADLESS-2
#monitor=HDMI-A-1,1920x1080@144,auto,1,bitdepth,8,mirror,HEADLESS-2

# Configuracion por defecto
monitor=,disable
#monitor=,preferred,auto,1,mirror,HEADLESS-2

# --- PROGRAMAS ---
$terminal = alacritty
#$menu = wofi --show drun
#$menu = rofi -show drun
$menu = ~/.config/hypr/scripts/rofi_launcher.sh
$fileManager = dolphin
$screenshot = grim -g "$(slurp)" - | swappy -f -

# --- AUTOSTART ---
## para uwsm usar el comando para los programas: uwsm app -- [comando]
exec = echo $HYPRLAND_INSTANSE_SIGNATURE > /home/stefano/.cache/hyprsignature.txt

# --- APPS DE SISTEMA ---
exec-once = uwsm app -- kdeconnect-indicator
exec-once = uwsm app -- xembedsniproxy

# exec-once = /home/stefano/proyectos/ProyectoAutoCambiadorPerfiles/clanker

# --- PORTAPAPELES (CLIPBOARD) ---
# 1. Borrar historial anterior al reiniciar
exec-once = rm "$HOME/.cache/cliphist/db"

# Iniciar servicios de copiado
exec-once = uwsm app -- wl-paste --type text --watch cliphist store 
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# --- PERMISOS ---
permission = /usr/bin/hyprlock, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow

# Layouts
#workspace = 1, layout:master

group {
    insert_after_current = true
    col.border_active = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.border_inactive = rgba(595959aa)

    groupbar {
        font_size = 10
        gradients = true
        render_titles = true
        col.active = rgba(33ccffee)
        col.inactive = rgba(595959aa)
    }
}

# --- VARIABLES DE ENTORNO ---

# --- VARIABLES DE UI EN HYPRLAND.CONF ---
env = GDK_SCALE,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

disable_autoreload = false

misc {
    vfr = true
}

xwayland {
  force_zero_scaling = true
}

ecosystem {
    #enforce_permissions = true
    enforce_permissions = false
}

# --- INPUT ---
input {
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    numlock_by_default = true
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }

    sensitivity = 0

    # El retraso antes de empezar a repetir (en milisegundos)
    # TTY suele usar 250ms. Prueba con 200 o 180 para algo "instantáneo".
    repeat_delay = 300

    # La velocidad de repetición (caracteres por segundo)
    # El estándar es 25-30. Súbelo a 45 o 50 para volar.
    repeat_rate = 45
}

device {
    name = logitech-usb-keyboard
    kb_layout = es
}

# Sunshine keyboard
device {
    name = keyboard-passthrough
    kb_layout = es
}

# --- APARIENCIA ---
general {
    gaps_in = 2
    gaps_out = 5
    border_size = 0
    col.active_border = rgb(d05d0e)
    col.inactive_border = rgb(181825)
    layout = dwindle
    allow_tearing = true
}

# Añade esta sección nueva si no existe
render {
    direct_scanout = false # A veces true causa artefactos en desktop
}

debug {
    # Desactiva esto si lo tienes en 1 para descartar que sea un problema de daño
    damage_tracking = 1 # 2 es el valor por defecto y más estable
    disable_logs = false
}

# Opciones experimentales para Nvidia
cursor {
    no_hardware_cursors = true 
}

decoration {
    rounding = 3
    active_opacity = 1.0
    inactive_opacity = 0.8

    # SINTAXIS NUEVA (Shadow)
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# --- ANIMACIONES ---
animations {
    enabled = no
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
    
    # Esto reemplaza a "layerrule = noanim, waybar"
    animation = layers, 0
}

# --- LAYOUTS ---
dwindle {
    pseudotile = true
    preserve_split = true
}

# -- LAYERRULES ---

layerrule {
    name = rofi
    match:namespace = rofi

    #no_screen_share = true
}

layerrule {
    name = swaync-control-center
    match:namespace = swaync-control-center

    #no_screen_share = true
}

layerrule {
    name = swaync-notification
    match:namespace = swaync-notification-window

    #no_screen_share = true
}


# --- GESTURES (ELIMINADO) ---
# La sección "gestures" con "workspace_swipe" causaba error porque fue eliminada.
# Si necesitas gestos, ahora se configuran de otra forma en la wiki oficial.

# =========================================================  
# 🪟 REGLAS DE VENTANA (SINTAXIS DE BLOQUES ESTRICTA)  
# =========================================================  
  
# Suprimir eventos de maximizado (ayuda con apps de QT/GTK)  
windowrule {  
    name = suppress-maximize  
    match:class = .*  
      
    suppress_event = maximize  
}  

# --- 2. GAMING (Steam, Lutris, Heroic) ---  

# steam (para ventanas de propiedades de juegos)
windowrule {
    name = steam-game-config
    match:class = ^(steam)

    workspace = 5 silent
    float = on
}
  
# >> STEAM (Cliente Principal)  
# Enviar la ventana principal al Workspace 5 y evitar que flote  
windowrule {  
    name = steam-main  
    match:class = ^(steam)$  
    match:title = ^(Steam)$  
      
    workspace = 5 silent  
    float = off  
}  
  
# >> STEAM (Ventanas Secundarias/Popups)  
# Lista de ventanas que deben FLOTAR y CENTRARSE  
windowrule {  
    name = steam-popups  
    match:class = ^(steam)$  
    match:title = ^(Sign in to Steam|Friends List|Steam Settings|Create or select.*|Sign in to Steam|Special Offers)$  
      
    float = on  
    center = on
}  
  
# Regla específica para la lista de amigos (tamaño)  
windowrule {  
    name = steam-friends-size  
    match:class = ^(steam)$  
    match:title = ^(Friends List)$  
      
    size = 400 600  
}  
  
# >> STEAM (Arreglo de Menús y Tooltips)  
# Fix crítico para menús que parpadean o aparecen vacíos  
windowrule {  
    name = steam-menus-fix  
    match:class = ^(steam)$  
    match:title = ^$  
      
    stay_focused = on  
    min_size = 1 1  
}  
  
# >> LANZADORES (Lutris, Heroic)  
# Al Workspace 5 junto con Steam  
windowrule {  
    name = game-launchers  
    match:class = ^(heroic|net.lutris.Lutris)$  
      
    workspace = 5  
}  
  
# >> JUEGOS EN EJECUCIÓN  
# Juegos de Steam, Proton, CS2 o Wine  
windowrule {  
    name = running-games  
    match:class = ^(steam_app_.*|steam_proton|cs2|gamescope|epicgameslauncher.exe)$  
      
    workspace = 6  
}  
  
windowrule {  
    name = running-games  
    match:xdg_tag = ^(proton-game)
      
    workspace = 6  
}  
# --- 3. NAVEGACIÓN Y WEB APPS ---  
  
# >> BRAVE (Principal)  

windowrule {  
    name = brave-browser-principal
    match:class = ^(brave-browser)$  
    match:title = ^(Principal)$
      
    maximize = true
    no_blur=true
    workspace = 1  
    border_color = rgb(d05d0e)  
}  

windowrule {  
    name = brave-browser
    match:class = ^(brave-browser)$  
      
    no_blur=true
    opacity = 1 override 1 override  
    border_color = rgb(d05d0e)  
}  
  
windowrule {
    name = workspace1
    match:workspace = 1

    float = on
    size = 80% 80%
}

# >> YOUTUBE MUSIC (Web App)  
windowrule {  
    name = webapp-ytmusic
    match:class = ^(brave-music.youtube.com__-Default)$  
      
    workspace = special:ytmusic  
    float = off
}  
  
# >> WHATSAPP (Web App)  
windowrule {  
    name = webapp-whatsapp  
    match:class = ^(brave-web.whatsapp.com__-Default)$  
      
    workspace = special:whatsapp  
    float = off
}  
  
# --- 4. UTILIDADES FLOTANTES ---  
  
# Grupo de Apps que siempre deben flotar y centrarse  
windowrule {  
    name = floating-utils  
    match:class = ^(org.gnome.Nautilus|thunar|org.pulseaudio.pavucontrol|blueman-manager|nm-connection-editor)$  
      
    float = on  
    center = on
}  
  
# Tamaños específicos para Gestor de Archivos  
windowrule {  
    name = FileManager  
    match:class = ^(org.gnome.Nautilus|thunar)$  
      
    size = 1000 800  
    center = on
}  
  
# Tamaños específicos para Control de Volumen  
windowrule {  
    name = pavucontrol-size  
    match:class = ^(org.pulseaudio.pavucontrol)$  
      
    size = 800 500  
}  
  
# --- 5. COMPATIBILIDAD (XWayland Video Bridge) ---  
# Necesario para compartir pantalla en Discord/Zoom  
windowrule {  
    name = xwayland-videobridge  
    match:class = ^(xwaylandvideobridge)$  
      
    opacity = 0.0 override 0.0 override  
    no_anim = on  
    no_initial_focus = on  
    max_size = 1 1  
    no_blur = on  
}

windowrule {
    name = explorador-archivos
    match:class = ^(org.kde.dolphin)$

    float = on
    center = on
    #size = 1200 800
    size = window_w*1.4 window_h*1.3
}

windowrule {
    name = guardado-de-archivos-portal
    match:class = ^(org.freedesktop.impl.portal.desktop.kde)$

    float = on
    center = on
    size = 1200 800
}

windowrule {
    name = Print
    match:initial_title = ^(Print)$

    float = on
}

windowrule {
    name = Qalculate
    match:class = ^(qalculate-gtk)

    float = on
    size = 782 539
}

windowrule {
    name = Terminal
    match:class = ^(Alacritty)

    float = off
    size = 1167, 793
}

windowrule {
    name = PacketTracerOther
    match:class = ^(PacketTracer)
    opacity = 1.0 override 1.0 override

    stay_focused = off
    float = on
}

windowrule {
    name = PacketTracerOther
    match:class = ^(PacketTracer)
    match:title = ^(Error)
    
    opacity = 1.0 override 1.0 override
    stay_focused = off
    float = on
}

windowrule {
    name = PacketTracerMain
    tag = +principal
    match:class = ^(PacketTracer)
    match:title = ^(Cisco Packet Tracer.*)
    opacity = 1.0 override 1.0 override

    float = off
    stay_focused = off
}

windowrule {
    name = PacketTracerModule
    match:class = ^(PacketTracer)
    opacity = 1.0 override 1.0 override
    #match:size = 10 10

    # Para que se pueda arrastrar
    stay_focused = on
    #focus_on_activate = off
    float = on
}

windowrule {
    name = PacketTracerWine
    match:class = ^(packettracer.exe)
    match:title = ^(Cisco Packet Tracer)

    float = on
}

# --- ATAJOS DE TECLADO ---
$mainMod = SUPER

### prueba
# Convertir la ventana actual en un Grupo (o añadirla a uno existente)
bind = $mainMod, G, togglegroup

# Navegar entre las ventanas del mismo grupo (Como en Sway)
# Si presionas Super + Flecha Derecha, pasas a la siguiente "pestaña"
bind = $mainMod, right, changegroupactive, f
bind = $mainMod, left, changegroupactive, b

# Sacar una ventana del grupo (si quieres que vuelva a estar al lado)
bind = $mainMod SHIFT, G, moveoutofgroup
###

#bind = $mainMod SHIFT, E, exec, hyprshutdown

# Bind inicial para entrar al menú
bind = $mainMod SHIFT, E, exec, notify-send "Power Menu" "L: Logout | S: Shutdown | R: Reboot | Esc: Cancel"
bind = $mainMod SHIFT, E, submap, power_menu

submap = power_menu

# L - Logout (Ejecuta directo o podrías pedir otra confirmación)
bind = , L, exec, hyprshutdown
bind = , L, submap, reset

# S - Shutdown (Usa el post-cmd que mencionaste)
bind = , S, exec, hyprshutdown --post-cmd "systemctl poweroff"
bind = , S, submap, reset

# R - Reboot
bind = , R, exec, hyprshutdown --post-cmd "systemctl reboot"
bind = , R, submap, reset

# Cancelar
bind = , Escape, submap, reset
bind = , N, submap, reset

submap = reset

bind = $mainMod, B, exec, uwsm app -- brave-browser.desktop
bind = $mainMod, T, exec, uwsm app -- $terminal
bind = $mainMod SHIFT, P, exec, uwsm app -- hyprlock # bloquear sesion
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, E, exec, uwsm app -- $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, S, exec, $screenshot
bind = $mainMod SHIFT, C, exec, hyprctl reload && pkill -SIGUSR2 waybar
bind = $mainMod CTRL, B, exec, pkill -SIGUSR1 waybar

# Foco y Movimiento
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpads
bind = $mainMod, minus, togglespecialworkspace, magic
bind = $mainMod SHIFT, minus, movetoworkspace, special:magic

bind = $mainMod, period, togglespecialworkspace, magic2
bind = $mainMod SHIFT, period, movetoworkspace, special:magic2

bind = $mainMod, comma, togglespecialworkspace, magic3
bind = $mainMod SHIFT, comma, movetoworkspace, special:magic3

bind = $mainMod CTRL, F9, togglespecialworkspace, whatsapp
bind = $mainMod CTRL, F10, togglespecialworkspace, ytmusic

# Resize Submap
bind = $mainMod, R, submap, resize
submap = resize
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# Mouse Binding
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia
bindel = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Abrir historial de portapapeles con Wofi
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/clipboard_launcher.sh

# sunshine conf
source = ~/.config/hypr/monitors_sunshine.conf

windowrule {
    name = workspace1
    match:workspace = 10

    opacity = 1 override 1 override  
    focus_on_activate = off
}

