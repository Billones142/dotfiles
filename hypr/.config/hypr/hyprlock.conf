general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
    hide_cursor = true
}

auth {
    fingerprint {
        enabled = true
    }
}

background {
    monitor =
    path = ~/wallpaper-locked
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ICONO DE HUELLA
image {
    monitor =
    path = /home/stefano/.config/hypr/fingerprint-white.svg
    size = 60
    rounding = 0
    border_size = 0
    rotate = 0
    reload_time = -1
    position = 0, -40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = JetBrains Mono Nerd Font Mono
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    
    # Cambia el color del borde exterior cuando falla
    fail_color = rgb(204, 34, 34)
    fail_text = 
}

# ESTADO DE LA AUTENTICACION
label {
    monitor =
    text = cmd[update:500] echo "$($HOME/.config/hypr/scripts/auth_status.sh "$FAIL" "$FPRINTPROMPT" "$ATTEMPTS")"
    # Cambia a rojo si hay intentos
    color = $($ATTEMPTS > 0 && echo "rgba(255, 50, 50, 1.0)" || echo "rgba(255, 255, 255, 1.0)")
    font_size = 14
    font_family = JetBrains Mono Nerd Font Mono
    position = 0, -180
    halign = center
    valign = center
}

# HORA
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 120
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -300
    halign = center
    valign = top
}

# FECHA
label {
    monitor =
    text = cmd[update:1000] echo "$(LC_TIME=es_ES.UTF-8 date +"%A, %d de %B")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 24
    font_family = JetBrains Mono Nerd Font Mono Semibold
    position = 0, -520
    halign = center
    valign = top
}

# BATERIA (Arriba Izquierda)
label {
    monitor =
    text = cmd[update:1000] echo "$($HOME/.config/hypr/scripts/battery_status.sh)"
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = JetBrains Mono Nerd Font Mono
    position = 30, -30
    halign = left
    valign = top
}

# RED (Arriba Izquierda, debajo de batería)
label {
    monitor =
    text = cmd[update:1000] echo "$($HOME/.config/hypr/scripts/network_status.sh)"
    color = rgba(255, 255, 255, 1.0)
    font_size = 18
    font_family = JetBrains Mono Nerd Font Mono
    position = 30, -60
    halign = left
    valign = top
}

# KDE CONNECT (Abajo Derecha)
label {
    monitor =
    text = cmd[update:1000] echo "$($HOME/.config/hypr/scripts/kdeconnect_status.sh)"
    color = rgba(255, 255, 255, 1.0)
    font_size = 16
    font_family = JetBrains Mono Nerd Font Mono
    position = -30, 30
    halign = right
    valign = bottom
}
