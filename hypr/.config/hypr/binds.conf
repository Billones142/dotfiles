# --- ATAJOS DE TECLADO ---
$mainMod = SUPER

### prueba
# Convertir la ventana actual en un Grupo (o añadirla a uno existente)
bind = $mainMod, G, togglegroup

# Navegar entre las ventanas del mismo grupo (Como en Sway)
# Si presionas Super + Flecha Derecha, pasas a la siguiente "pestaña"
bind = $mainMod, right, changegroupactive, f
bind = $mainMod, left, changegroupactive, b

# Sacar una ventana del grupo (si quieres que vuelva a estar al lado)
bind = $mainMod SHIFT, G, moveoutofgroup
###

# Bind inicial para entrar al menú
bind = $mainMod SHIFT, E, exec, notify-send "Power Menu" "L: Logout | S: Shutdown | R: Reboot | Esc: Cancel"
bind = $mainMod SHIFT, E, submap, power_menu

submap = power_menu

# L - Logout (Ejecuta directo o podrías pedir otra confirmación)
bind = , L, exec, $logout
bind = , L, submap, reset

# S - Shutdown (Usa el post-cmd que mencionaste)
bind = , S, exec, $poweroff
bind = , S, submap, reset

# R - Reboot
bind = , R, exec, $reboot
bind = , R, submap, reset

# Cancelar
bind = , Escape, submap, reset
bind = , N, submap, reset

submap = reset

bind = $mainMod, B, exec, $browser
bind = $mainMod, T, exec, uwsm app -- $terminal
bind = $mainMod SHIFT, P, exec, uwsm app -- hyprlock # bloquear sesion
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, E, exec, uwsm app -- $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, S, exec, $screenshot
bind = $mainMod SHIFT, C, exec, hyprctl reload && pkill -SIGUSR2 waybar
bind = $mainMod CTRL, B, exec, pkill -SIGUSR1 waybar

# Foco y Movimiento
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpads
bind = $mainMod, minus, togglespecialworkspace, magic
bind = $mainMod SHIFT, minus, movetoworkspace, special:magic

bind = $mainMod, period, togglespecialworkspace, magic2
bind = $mainMod SHIFT, period, movetoworkspace, special:magic2

bind = $mainMod, comma, togglespecialworkspace, magic3
bind = $mainMod SHIFT, comma, movetoworkspace, special:magic3

bind = $mainMod CTRL, F9, togglespecialworkspace, whatsapp
bind = $mainMod CTRL, F10, togglespecialworkspace, ytmusic

# Resize Submap
bind = $mainMod, R, submap, resize
submap = resize
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# Mouse Binding
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Botón de Apagado (Power)
bindl = , XF86PowerOff, exec, $poweroff

# Botón de Reinicio (si tu teclado/laptop tiene uno dedicado)
# Nota: A veces se mapea como una combinación o tecla especial
bindl = , XF86Sleep, exec, $reboot

# Multimedia
#bindel = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
#bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
#bindel = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
#bindel = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
#bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
#bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
# Control de Brillo con OSD
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Abrir historial de portapapeles con Wofi
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/clipboard_launcher.sh

# binds para programas
bind = SUPER, F10, pass, class:^(com\.obsproject\.Studio)$
