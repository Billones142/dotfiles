# --- MONITORES ---
# Monitor principal para que sunshine pueda tener un stream constante
exec-once = ~/.scripts/sunshine_desk_deactivate.sh
monitor=HEADLESS-2,1920x1080@144,auto,1,vrr,1#,bitdepth,10,cm,hdr

#monitorv2 {
#    output = HEADLESS-2
#    mode = 1920x1080@144
#    position = 0x0
#    scale = 1
#    bitdepth = 8
#    #bitdepth = 10
#    #cm = hdr
#}

# gamer
monitorv2 {
    output = desc:Acer Technologies Acer KG241 P 0x92638149
    mirror = HEADLESS-2
    mode = 1920x1080@144
    scale = 1
    bitdepth = 8
    vrr=1
    #bitdepth = 10
    #cm = hdr
}

# laptop-stefano
monitorv2 {
    output = desc:AU Optronics 0x4A90
    mirror = HEADLESS-2
    mode = 1920x1080@60
    scale = 1.2
    bitdepth = 8
    vrr=1
    #bitdepth = 10
    #cm = hdr
}

# Configuracion por defecto
monitor=,disable
#monitor=,preferred,auto,1


# Hace que algunas apps con datos posiblemente sensibles no se vean al compartir pantalla
$streamer_mode = false

# --- PROGRAMAS ---
$terminal = alacritty
#$menu = wofi --show drun
#$menu = rofi -show drun
$menu = ~/.config/hypr/scripts/rofi_launcher.sh
$fileManager = dolphin
$screenshot = grim -g "$(slurp)" - | swappy -f -

# comandos
$poweroff= hyprshutdown --post-cmd "systemctl poweroff"
$reboot= hyprshutdown --post-cmd "systemctl reboot"
$logout= hyprshutdown
$browser= uwsm app -- brave-browser.desktop

# --- AUTOSTART ---
## para uwsm usar el comando para los programas: uwsm app -- [comando]
#exec = echo $HYPRLAND_INSTANSE_SIGNATURE > /home/stefano/.cache/hyprsignature.txt

# inhibir el boton de inicio
exec-once = uwsm app -- systemd-inhibit --what=handle-power-key:handle-reboot-key --who="Hyprland Session" --why="Custom shutdown handling" --mode=block Hyprland

# --- APPS DE SISTEMA ---
exec-once = uwsm app -- kdeconnect-indicator
exec-once = uwsm app -- swayosd-server
#exec-once = uwsm app -- /usr/lib/pam_kwallet_init
#exec-once = uwsm app -- xembedsniproxy
#exec-once = uwsm app -- dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Replay buffer de obs
#exec-once = uwsm app -- obs --minimize-to-tray --startreplaybuffer --scene Replay

# exec-once = /home/stefano/proyectos/ProyectoAutoCambiadorPerfiles/clanker

# --- PORTAPAPELES (CLIPBOARD) ---
# 1. Borrar historial anterior al reiniciar
exec-once = rm "$HOME/.cache/cliphist/db"

# Iniciar servicios de copiado
exec-once = uwsm app -- wl-paste --type text --watch cliphist store 
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# --- PERMISOS ---
permission = /usr/bin/hyprlock, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow

# Layouts
#workspace = 1, layout:master

group {
    insert_after_current = true
    col.border_active = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.border_inactive = rgba(595959aa)

    groupbar {
        font_size = 10
        gradients = true
        render_titles = true
        col.active = rgba(33ccffee)
        col.inactive = rgba(595959aa)
    }
}

# --- VARIABLES DE ENTORNO ---

# --- VARIABLES DE UI EN HYPRLAND.CONF ---
env = GDK_SCALE,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

disable_autoreload = false

misc {
    vfr = true
    vrr = true
}

xwayland {
  force_zero_scaling = true
  use_nearest_neighbor = true
}

ecosystem {
    #enforce_permissions = true
    enforce_permissions = false
}


# --- INPUT ---
input {
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    numlock_by_default = true
    follow_mouse = 1
    touchpad {
        natural_scroll = true
	disable_while_typing = no
	clickfinger_behavior = yes
	drag_lock = yes
        scroll_factor = 0.15
    }

    sensitivity = 0

    # El retraso antes de empezar a repetir (en milisegundos)
    # TTY suele usar 250ms. Prueba con 200 o 180 para algo "instantáneo".
    repeat_delay = 200

    # La velocidad de repetición (caracteres por segundo)
    # El estándar es 25-30. Súbelo a 45 o 50 para volar.
    repeat_rate = 45
}

# --- APARIENCIA ---
general {
    gaps_in = 2
    gaps_out = 5
    border_size = 0
    col.active_border = rgb(d05d0e)
    col.inactive_border = rgb(181825)
    layout = dwindle
    allow_tearing = true
}

# Añade esta sección nueva si no existe
render {
    direct_scanout = false # A veces true causa artefactos en desktop
}

debug {
    # Desactiva esto si lo tienes en 1 para descartar que sea un problema de daño
    damage_tracking = 1 # 2 es el valor por defecto y más estable
    disable_logs = false
}

# Opciones experimentales para Nvidia
cursor {
    no_hardware_cursors = true 
}

decoration {
    rounding = 3
    active_opacity = 1.0
    inactive_opacity = 0.8

    # SINTAXIS NUEVA (Shadow)
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# --- ANIMACIONES ---
animations {
    enabled = no
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
    
    # Esto reemplaza a "layerrule = noanim, waybar"
    animation = layers, 0
}

# --- LAYOUTS ---
dwindle {
    pseudotile = true
    preserve_split = true
}




# --- GESTURES (ELIMINADO) ---
# La sección "gestures" con "workspace_swipe" causaba error porque fue eliminada.
# Si necesitas gestos, ahora se configuran de otra forma en la wiki oficial.


# --- DISPOSITIVOS ---
source = ~/.config/hypr/devices.conf

# --- ATAJOS DE TECLADO ---
source = ~/.config/hypr/binds.conf

# -- LAYERRULES ---
source = ~/.config/hypr/layerrules.conf

# REGLAS DE VENTANA
source = ~/.config/hypr/windowrules.conf

# sunshine conf
source = ~/.config/hypr/monitors_sunshine.conf
